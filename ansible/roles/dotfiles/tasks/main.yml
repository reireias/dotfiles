---
- name: List dotfiles
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!gitignore|shellcheckrc|ansible-lint|prettierrc|stylua).*$"
    file_type: "file"
    use_regex: true
    hidden: true
  register: dotfiles_list

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | basename }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_list.files }}"

- name: List dotdirs
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!(git|claude|ansible)).*$"
    file_type: "directory"
    use_regex: true
    hidden: true
  register: dotfiles_dotdirs

- name: List files
  find:
    paths: "{{ dotfiles_dotdirs.files | map(attribute='path') | list }}"
    file_type: "file"
    recurse: true
  register: dotfiles_files

- name: Create directory
  file:
    path: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') | dirname }}"
    state: directory
    mode: "0755"
  with_items: "{{ dotfiles_files.files }}"

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_files.files }}"

# Symlinks created by older revisions of this repository become dangling
# when the source file is removed. Clean up links that point into the
# repository but no longer resolve.
- name: List broken symlinks pointing into this repository  # noqa: command-instead-of-module
  shell: |
    set -o pipefail
    {
      find "$HOME" -maxdepth 1 -name '.*' -type l
      {% for dir in dotfiles_dotdirs.files %}
      find "$HOME/{{ dir.path | basename }}" -type l 2>/dev/null || true
      {% endfor %}
    } | while IFS= read -r link; do
      target=$(readlink "$link")
      if [ ! -e "$link" ] && [ "${target#{{ playbook_dir | dirname }}/}" != "$target" ]; then
        printf '%s\n' "$link"
      fi
    done
  args:
    executable: /bin/bash
  register: dotfiles_broken_links
  changed_when: false
  check_mode: false

- name: Remove broken symlinks
  file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ dotfiles_broken_links.stdout_lines }}"

# The mise baseline lives in mise/config.toml and is symlinked into
# ~/.config/mise/conf.d/. ~/.config/mise/config.toml is machine-local
# and where `mise use -g` writes; it overrides the baseline while the
# working directory is under $HOME.
- name: Create mise conf.d directory
  file:
    path: ~/.config/mise/conf.d
    state: directory
    mode: "0755"

- name: Check mise config.local.toml from a previous setup
  stat:
    path: ~/.config/mise/config.local.toml
  register: dotfiles_mise_local

- name: Remove mise baseline symlink from a previous setup
  file:
    path: ~/.config/mise/config.local.toml
    state: absent
  when:
    - dotfiles_mise_local.stat.exists
    - dotfiles_mise_local.stat.islnk
    - (playbook_dir | dirname) in dotfiles_mise_local.stat.lnk_target

- name: Link mise baseline config
  file:
    src: "{{ playbook_dir }}/../mise/config.toml"
    dest: ~/.config/mise/conf.d/baseline.toml
    state: link
    force: true
