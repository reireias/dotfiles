---
- name: List dotfiles
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!gitignore|shellcheckrc|ansible-lint|prettierrc|stylua).*$"
    file_type: "file"
    use_regex: true
    hidden: true
  register: dotfiles_list

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | basename }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_list.files }}"

- name: List dotdirs
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!(git|claude|ansible)).*$"
    file_type: "directory"
    use_regex: true
    hidden: true
  register: dotfiles_dotdirs

- name: List files
  find:
    paths: "{{ dotfiles_dotdirs.files | map(attribute='path') | list }}"
    file_type: "file"
    recurse: true
  register: dotfiles_files

- name: Create directory
  file:
    path: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') | dirname }}"
    state: directory
    mode: "0755"
  with_items: "{{ dotfiles_files.files }}"

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_files.files }}"

# Symlinks created by older revisions of this repository become dangling
# when the source file is removed. Clean up links that point into the
# repository but no longer resolve.
- name: List broken symlinks pointing into this repository  # noqa: command-instead-of-module
  shell: |
    set -o pipefail
    {
      find "$HOME" -maxdepth 1 -name '.*' -type l
      {% for dir in dotfiles_dotdirs.files %}
      find "$HOME/{{ dir.path | basename }}" -type l 2>/dev/null || true
      {% endfor %}
    } | while IFS= read -r link; do
      target=$(readlink "$link")
      if [ ! -e "$link" ] && [ "${target#{{ playbook_dir | dirname }}/}" != "$target" ]; then
        printf '%s\n' "$link"
      fi
    done
  args:
    executable: /bin/bash
  register: dotfiles_broken_links
  changed_when: false
  check_mode: false

- name: Remove broken symlinks
  file:
    path: "{{ item }}"
    state: absent
  with_items: "{{ dotfiles_broken_links.stdout_lines }}"

# The mise baseline is rendered to ~/.tool-versions, the only layer that
# loads below ~/.config/mise/config.toml when the cwd is inside the home
# directory. With no symlink into the repository, mise commands
# (e.g. `mise use -g`, `mise upgrade --bump`) can never write into it,
# and ~/.config/mise/config.toml stays machine-local and always wins.
# mise/config.toml must contain only simple `name = "version"` lines.
- name: Check existing mise global config
  stat:
    path: ~/.config/mise/config.toml
  register: dotfiles_mise_config

- name: Remove mise global config symlink left by previous setup
  file:
    path: ~/.config/mise/config.toml
    state: absent
  when: dotfiles_mise_config.stat.exists and dotfiles_mise_config.stat.islnk

- name: Remove mise baseline copy from a broken design iteration
  file:
    path: ~/.config/mise/config.local.toml
    state: absent

- name: Render mise baseline to ~/.tool-versions
  copy:
    dest: ~/.tool-versions
    mode: "0644"
    content: |
      # Generated from {{ playbook_dir | dirname }}/mise/config.toml by `make dotfiles`. Do not edit.
      {% for tool in lookup('file', playbook_dir + '/../mise/config.toml')
         | regex_findall('(?m)^([A-Za-z0-9_-]+) *= *"([^"]+)"$') %}
      {{ tool[0] }} {{ tool[1] }}
      {% endfor %}
