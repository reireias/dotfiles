---
- name: List dotfiles
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!gitignore|shellcheckrc|ansible-lint|prettierrc|stylua).*$"
    file_type: "file"
    use_regex: true
    hidden: true
  register: dotfiles_list

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | basename }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_list.files }}"

- name: List dotdirs
  find:
    path: "{{ playbook_dir }}/../"
    patterns: "^\\.(?!(git|claude|ansible)).*$"
    file_type: "directory"
    use_regex: true
    hidden: true
  register: dotfiles_dotdirs

- name: List files
  find:
    paths: "{{ dotfiles_dotdirs.files | map(attribute='path') | list }}"
    file_type: "file"
    recurse: true
  register: dotfiles_files

- name: Create directory
  file:
    path: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') | dirname }}"
    state: directory
    mode: "0755"
  with_items: "{{ dotfiles_files.files }}"

- name: Create symbolic link
  file:
    src: "{{ item.path }}"
    dest: "~/{{ item.path | regex_replace(playbook_dir | dirname + '/') }}"
    state: "link"
    force: true
  with_items: "{{ dotfiles_files.files }}"

# The mise baseline is copied, not symlinked, so that mise commands
# (e.g. `mise use -g`, `mise upgrade --bump`) can never write into this
# repository. ~/.config/mise/config.toml is machine-local and untouched.
- name: Check existing mise global config
  stat:
    path: ~/.config/mise/config.toml
  register: dotfiles_mise_config

- name: Remove mise global config symlink left by previous setup
  file:
    path: ~/.config/mise/config.toml
    state: absent
  when: dotfiles_mise_config.stat.exists and dotfiles_mise_config.stat.islnk

- name: Create mise config directory
  file:
    path: ~/.config/mise
    state: directory
    mode: "0755"

- name: Copy mise baseline config
  copy:
    src: "{{ playbook_dir }}/../mise/config.toml"
    dest: ~/.config/mise/config.local.toml
    mode: "0644"
